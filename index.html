<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>寶可夢卡牌圖鑑</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════
   ★ 線上版說明：
     1. 將下方 SHEET_CSV_URL 換成你的 Google Sheets 公開 CSV 網址
     2. 圖片全部使用 CSV 裡的 image_url 欄位（官方網址），不需要本地圖片
   ════════════════════════════════════════════════════════ */
:root {
  --bg:        #090d18;
  --bg2:       #0f1526;
  --surface:   #141b30;
  --surface2:  #1a2340;
  --border:    #1f2b4a;
  --border2:   #2a3a64;
  --gold:      #f0c040;
  --gold-dim:  rgba(240,192,64,.15);
  --blue:      #3060e0;
  --blue-dim:  rgba(48,96,224,.2);
  --red:       #e03040;
  --text:      #d8e0f8;
  --text2:     #7888b8;
  --text3:     #404870;
  --grass:#50c050;--fire:#e06030;--water:#3090f0;
  --lightning:#f0c020;--psychic:#c060e0;--fighting:#c08030;
  --dark:#7060b0;--metal:#9090b0;--fairy:#f080c0;
  --dragon:#6050d0;--colorless:#9098b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:14px;padding:8px 20px;flex-shrink:0;background:var(–surface);border-bottom:1px solid var(–border)}
.pokeball{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(–red) 180deg,#fff 180deg);border:2px solid #fff;box-shadow:0 0 0 2px var(–blue),0 0 14px var(–blue-dim);position:relative}
.pokeball::after{content:’’;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#fff;border-radius:50%;border:2px solid #222}
.logo-text{font-family:‘Orbitron’,sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(–gold);text-shadow:0 0 16px var(–gold-dim)}
.topbar-stats{margin-left:auto;font-size:.68rem;color:var(–text3);letter-spacing:.5px;text-align:right;line-height:1.8}
.topbar-stats b{color:var(–gold);font-size:.8rem}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:230px 220px 1fr 310px;flex:1;overflow:hidden}

/* ── LEFT ── */
.left{background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{padding:10px 14px 8px;flex-shrink:0;font-family:‘Orbitron’,sans-serif;font-size:.52rem;letter-spacing:3px;color:var(–gold);border-bottom:1px solid var(–border)}
.filters{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1}
.fg label{display:block;font-size:.8rem;letter-spacing:1.5px;color:var(–text3);text-transform:uppercase;margin-bottom:4px}
.fg input,.fg select{width:100%;background:var(–bg2);border:1px solid var(–border);border-radius:6px;color:var(–text);font-family:‘Zen Kaku Gothic New’,sans-serif;font-size:.95rem;padding:7px 10px;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(–blue)}
.fg select option{background:var(–bg2)}
.hp-row{display:grid;grid-template-columns:1fr 12px 1fr;gap:4px;align-items:center}
.hp-sep{text-align:center;color:var(–text3);font-size:1rem}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 10px;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;border:1px solid transparent;opacity:.55;transition:all .12s;user-select:none}
.chip:hover{opacity:.85}
.chip.on{opacity:1;border-color:currentColor;box-shadow:0 0 6px currentColor;transform:scale(1.07)}
.chip[data-e=“草”]{color:var(–grass);background:rgba(80,192,80,.12)}
.chip[data-e=“火”]{color:var(–fire);background:rgba(224,96,48,.12)}
.chip[data-e=“水”]{color:var(–water);background:rgba(48,144,240,.12)}
.chip[data-e=“雷”]{color:var(–lightning);background:rgba(240,192,32,.12)}
.chip[data-e=“超”]{color:var(–psychic);background:rgba(192,96,224,.12)}
.chip[data-e=“鬥”]{color:var(–fighting);background:rgba(192,128,48,.12)}
.chip[data-e=“惡”]{color:var(–dark);background:rgba(112,96,176,.12)}
.chip[data-e=“鋼”]{color:var(–metal);background:rgba(144,144,176,.12)}
.chip[data-e=“妖”]{color:var(–fairy);background:rgba(240,128,192,.12)}
.chip[data-e=“龍”]{color:var(–dragon);background:rgba(96,80,208,.12)}
.chip[data-e=“無”]{color:var(–colorless);background:rgba(144,152,184,.12)}
/* 招式能量 chip（外觀同屬性 chip，用 data-a） */
.chip[data-a=“草”]{color:var(–grass);background:rgba(80,192,80,.12)}
.chip[data-a=“火”]{color:var(–fire);background:rgba(224,96,48,.12)}
.chip[data-a=“水”]{color:var(–water);background:rgba(48,144,240,.12)}
.chip[data-a=“雷”]{color:var(–lightning);background:rgba(240,192,32,.12)}
.chip[data-a=“超”]{color:var(–psychic);background:rgba(192,96,224,.12)}
.chip[data-a=“鬥”]{color:var(–fighting);background:rgba(192,128,48,.12)}
.chip[data-a=“惡”]{color:var(–dark);background:rgba(112,96,176,.12)}
.chip[data-a=“鋼”]{color:var(–metal);background:rgba(144,144,176,.12)}
.chip[data-a=“妖”]{color:var(–fairy);background:rgba(240,128,192,.12)}
.chip[data-a=“龍”]{color:var(–dragon);background:rgba(96,80,208,.12)}
.chip[data-a=“無”]{color:var(–colorless);background:rgba(144,152,184,.12)}
.btn-search{margin:10px;flex-shrink:0;padding:10px;background:#3060e0;background:linear-gradient(135deg,#3060e0,#1840b0);border:none;border-radius:8px;color:#fff;font-family:‘Orbitron’,sans-serif;font-size:.8rem;letter-spacing:2px;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 4px 16px rgba(48,96,224,.35)}
.btn-search:hover{opacity:.9;transform:translateY(-1px)}
.btn-reset{margin:0 10px 10px;padding:8px;flex-shrink:0;background:#1a2340;border:1px solid #2a3a64;border-radius:8px;color:#7888b8;font-family:‘Zen Kaku Gothic New’,sans-serif;font-size:.88rem;cursor:pointer;transition:all .15s}
.btn-reset:hover{border-color:#e03040;color:#e03040}

/* ── CENTER ── */
.center{display:flex;flex-direction:column;overflow:hidden;background:var(–bg)}
.result-bar{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(–border);flex-shrink:0}
.rcount{font-family:‘Orbitron’,sans-serif;font-size:.58rem;letter-spacing:1px;color:var(–text3)}
.sort-sel{margin-left:auto;background:var(–surface);border:1px solid var(–border);border-radius:5px;color:var(–text2);font-size:.7rem;padding:3px 7px;outline:none;font-family:‘Zen Kaku Gothic New’,sans-serif}
.dedup-toggle{
display:flex;align-items:center;gap:6px;cursor:pointer;
font-size:.75rem;color:var(–text2);user-select:none;white-space:nowrap;
}
.dedup-toggle input{display:none}
.dedup-box{
width:16px;height:16px;border-radius:4px;
border:1px solid var(–border2);background:var(–bg2);
display:flex;align-items:center;justify-content:center;
transition:all .15s;flex-shrink:0;
}
.dedup-toggle input:checked + .dedup-box{
background:var(–blue);border-color:var(–blue);
}
.dedup-toggle input:checked + .dedup-box::after{
content:‘✓’;font-size:.65rem;color:#fff;font-weight:700;
}
.grid-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;overflow-y:auto;flex:1;align-content:start}
.card-thumb{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid var(–border);aspect-ratio:0.717;background:var(–surface);transition:transform .14s,border-color .14s,box-shadow .14s}
.card-thumb:hover{transform:translateY(-3px);border-color:var(–border2);box-shadow:0 8px 20px rgba(0,0,0,.6)}
.card-thumb.sel{border-color:var(–gold);box-shadow:0 0 0 1px var(–gold),0 4px 16px var(–gold-dim)}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(–text3);text-align:center;padding:6px;line-height:1.4}
.empty-st{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(–text3);font-size:.82rem}
.empty-ball{width:64px;height:64px;border-radius:50%;background:conic-gradient(var(–surface2) 180deg,var(–bg2) 180deg);border:3px solid var(–border);opacity:.35}
.pager{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 12px;border-top:1px solid var(–border);flex-shrink:0;background:var(–surface)}
.pager-btn{min-width:30px;height:28px;padding:0 7px;background:var(–bg2);border:1px solid var(–border);border-radius:5px;color:var(–text2);font-size:.72rem;cursor:pointer;transition:background .12s,color .12s;font-family:‘Zen Kaku Gothic New’,sans-serif;display:inline-flex;align-items:center;justify-content:center}
.pager-btn:hover:not(:disabled){background:var(–surface2);color:var(–text)}
.pager-btn.active{background:var(–blue);border-color:var(–blue);color:#fff}
.pager-btn:disabled{opacity:.3;cursor:default}
.pager-info{font-size:.68rem;color:var(–text3);padding:0 6px;white-space:nowrap}

/* ── BIG IMAGE ── */
.bigimg-panel{background:var(–bg2);border-left:1px solid var(–border);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px}
.bigimg-panel img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.7);display:block}
.bigimg-empty{color:var(–text3);font-size:.85rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.bigimg-empty .empty-ball{width:56px;height:56px;border-radius:50%;background:conic-gradient(var(–surface2) 180deg,var(–bg2) 180deg);border:3px solid var(–border);opacity:.35}

/* ── RIGHT ── */
.right{background:var(–surface);border-left:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden}
.dtop{padding:12px 14px 9px;border-bottom:1px solid var(–border);flex-shrink:0}
.dname{font-size:1.4rem;font-weight:700;color:var(–gold);line-height:1.25;margin-bottom:5px}
.dmeta{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:.8rem;padding:3px 9px;border-radius:4px;border:1px solid var(–border);color:var(–text2);background:var(–surface2)}
.dbody{overflow-y:auto;flex:1;padding:11px 13px}
.dsec{margin-bottom:13px}
.dsec-hdr{font-family:‘Orbitron’,sans-serif;font-size:.7rem;letter-spacing:2px;color:var(–blue);border-bottom:1px solid var(–border);padding-bottom:5px;margin-bottom:8px}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:1rem}
.sl{color:var(–text3)}.sv{color:var(–text);font-weight:500}
.hp-badge{font-family:‘Orbitron’,sans-serif;font-weight:900;font-size:1.1rem;background:var(–red);color:#fff;padding:2px 11px;border-radius:4px;box-shadow:0 2px 8px rgba(224,48,64,.35)}
.ability-card{background:#0f1526;border:1px solid #1f2b4a;border-left:2px solid #c060e0;border-radius:0 6px 6px 0;padding:9px 11px;margin-bottom:8px}
.aname{font-size:1rem;font-weight:700;color:#c060e0;margin-bottom:4px}
.aeff{font-size:.9rem;color:#7888b8;line-height:1.6}
.atk-card{background:#0f1526;border:1px solid #1f2b4a;border-radius:7px;padding:9px 11px;margin-bottom:8px}
.atk-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.atk-name{font-size:1rem;font-weight:700;color:var(–text)}
.cost-wrap{display:flex;gap:3px}
.ec{width:18px;height:18px;border-radius:50%;font-size:.6rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ec-草{background:var(–grass);color:#fff}.ec-火{background:var(–fire);color:#fff}
.ec-水{background:var(–water);color:#fff}.ec-雷{background:var(–lightning);color:#000}
.ec-超{background:var(–psychic);color:#fff}.ec-鬥{background:var(–fighting);color:#fff}
.ec-惡{background:var(–dark);color:#fff}.ec-鋼{background:var(–metal);color:#fff}
.ec-妖{background:var(–fairy);color:#fff}.ec-龍{background:var(–dragon);color:#fff}
.ec-無{background:var(–colorless);color:#222}
.atk-dmg{font-family:‘Orbitron’,sans-serif;font-size:1.2rem;font-weight:700;color:#f0c040;margin-left:auto}
.atk-eff{font-size:.88rem;color:#7888b8;line-height:1.6}
.eff-block{background:#0f1526;border:1px solid #1f2b4a;border-left:2px solid #3060e0;border-radius:0 6px 6px 0;padding:10px 13px;font-size:.9rem;color:#7888b8;line-height:1.7;white-space:pre-wrap}
.bstats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.bstat{background:#0f1526;border:1px solid #1f2b4a;border-radius:6px;padding:7px;text-align:center}
.bstat-l{font-size:.72rem;letter-spacing:1px;color:#404870;margin-bottom:3px}
.bstat-v{font-size:.95rem;font-weight:700;color:#d8e0f8}
.rule-block{background:#0f1526;border:1px solid #1f2b4a;border-left:2px solid #f0c040;border-radius:0 6px 6px 0;padding:9px 11px;margin-bottom:6px;font-size:.88rem;color:#aab0cc;line-height:1.65}
.no-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#404870;gap:10px;font-size:1rem}

/* ── 切換按鈕 ── */
.btn-mode{
margin-left:10px;padding:4px 12px;
background:var(–surface2);border:1px solid var(–border2);
border-radius:6px;color:var(–text2);font-size:.75rem;cursor:pointer;
font-family:‘Zen Kaku Gothic New’,sans-serif;transition:all .15s;white-space:nowrap;
}
.btn-mode:hover{border-color:var(–gold);color:var(–gold)}
.btn-mode.mobile-on{background:var(–gold);border-color:var(–gold);color:#111;font-weight:700}

/* ══ 手機模式 ══════════════════════════════════════════════
body.mobile 時，整體變成單欄垂直捲動
結構：篩選面板(常開) → 卡片格 → 大圖 → 詳情
══════════════════════════════════════════════════════════ */
body.mobile{overflow:auto}
body.mobile .layout{
display:flex;flex-direction:column;
height:auto;overflow:visible;
}
/* 左側篩選：常開（移除收合） */
body.mobile .left{
width:100%;height:auto;border-right:none;
border-bottom:1px solid var(–border);overflow:visible;
}
body.mobile .filters{
display:flex;  /* ★ 改為常開 */
max-height:none;overflow-y:visible;
}
body.mobile .panel-hdr{
display:flex;align-items:center;justify-content:space-between;
}

/* 中間卡片格：3欄 */
body.mobile .center{width:100%;overflow:visible;height:auto}
body.mobile .grid-wrap{height:auto;overflow:visible;flex:none}
body.mobile .grid{
grid-template-columns:repeat(3,1fr);
overflow:visible;height:auto;
}
body.mobile .grid-wrap .grid{flex:none}

/* 大圖 */
body.mobile .bigimg-panel{
width:100%;height:auto;
border-left:none;border-top:1px solid var(–border);
padding:0;
}
body.mobile .bigimg-panel img{
width:100%;max-height:none;
border-radius:0;box-shadow:none;
}

/* 詳情 */
body.mobile .right{
width:100%;height:auto;border-left:none;
border-top:1px solid var(–border);
overflow:visible;
}
body.mobile .dbody{overflow:visible;height:auto;padding-bottom:100px}

/* 手機統計列 */
body.mobile .topbar-stats{font-size:.62rem;line-height:1.5}
body.mobile .logo-text{font-size:.85rem;letter-spacing:2px}

/* ★ 手機換頁按鈕放大 */
body.mobile .pager{padding:12px 8px;gap:6px}
body.mobile .pager-btn{
min-width:44px;height:44px;font-size:1rem;
border-radius:8px;
}
body.mobile .pager-info{font-size:.82rem;padding:0 8px}

/* ★ 浮動上下捲動按鈕 */
.scroll-btns{
position:fixed;right:14px;bottom:24px;
display:none;flex-direction:column;gap:8px;z-index:100;
}
body.mobile .scroll-btns{display:flex}
.scroll-btn{
width:46px;height:46px;border-radius:50%;
background:#3060e0;border:none;
color:#fff;font-size:1.2rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 16px rgba(0,0,0,.5);
transition:background .15s,transform .1s;
}
.scroll-btn:hover{background:#2050c0;transform:scale(1.08)}
.scroll-btn:active{transform:scale(.95)}
.scroll-btn-clear{background:#e03040}
.scroll-btn-clear:hover{background:#b02020}

/* ── 牌組抽屜 ── */
.deck-drawer{
position:fixed;top:0;left:0;width:100%;height:100%;
z-index:150;display:none;
}
.deck-drawer.open{display:flex}
.deck-backdrop{
position:absolute;inset:0;
background:rgba(9,13,24,.7);backdrop-filter:blur(4px);
}
.deck-panel{
position:relative;z-index:1;
width:420px;max-width:100%;
background:var(–surface);
border-right:1px solid var(–border);
display:flex;flex-direction:column;
animation:slideIn .2s ease;
}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.deck-panel-hdr{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;border-bottom:1px solid var(–border);
font-family:‘Orbitron’,sans-serif;font-size:.75rem;
letter-spacing:2px;color:var(–gold);flex-shrink:0;
}
.deck-close{
background:transparent;border:none;color:var(–text3);
font-size:1.2rem;cursor:pointer;padding:2px 6px;
transition:color .15s;
}
.deck-close:hover{color:var(–red)}

/* 輸入區 */
.deck-input-area{
padding:14px 16px;border-bottom:1px solid var(–border);
flex-shrink:0;
}
.deck-region-tabs{
display:flex;gap:6px;margin-bottom:10px;
}
.rtab{
flex:1;padding:8px;border-radius:6px;
border:1px solid #2a3a64;background:#0f1526;
color:#7888b8;font-size:.88rem;cursor:pointer;
text-align:center;transition:all .15s;
font-family:‘Zen Kaku Gothic New’,sans-serif;font-weight:500;
}
.rtab.on{background:#3060e0;border-color:#3060e0;color:#fff;font-weight:700}
.rtab:not(.on):hover{border-color:#3060e0;color:#d8e0f8}
.deck-input-row{display:flex;gap:6px}
.deck-code-input{
flex:1;background:#0f1526;border:1px solid #2a3a64;
border-radius:6px;color:#d8e0f8;
font-family:‘Zen Kaku Gothic New’,sans-serif;
font-size:.9rem;padding:8px 10px;outline:none;
transition:border-color .15s;
}
.deck-code-input:focus{border-color:#3060e0}
.deck-code-input::placeholder{color:#404870;font-size:.8rem}
.btn-deck-fetch{
padding:8px 16px;background:#3060e0;border:none;
border-radius:6px;color:#fff;font-size:.9rem;font-weight:700;
cursor:pointer;transition:opacity .15s;white-space:nowrap;
font-family:‘Zen Kaku Gothic New’,sans-serif;
}
.btn-deck-fetch:hover{opacity:.85}
.btn-deck-fetch:disabled{opacity:.4;cursor:default}
.deck-status{
margin-top:8px;font-size:.72rem;color:var(–text3);
min-height:18px;line-height:1.5;
}
.deck-status.err{color:#f08080}
.deck-status.ok{color:#60d080}

/* 牌組列表 */
.deck-list{overflow-y:auto;flex:1;padding:10px 12px}
.deck-section-title{
font-size:.6rem;letter-spacing:2px;color:var(–gold);
font-family:‘Orbitron’,sans-serif;
border-bottom:1px solid var(–border);
padding-bottom:5px;margin:10px 0 6px;
}
.deck-section-title:first-child{margin-top:0}
.deck-card-row{
display:flex;align-items:center;gap:10px;
padding:6px 8px;border-radius:7px;cursor:pointer;
transition:background .12s;margin-bottom:3px;
}
.deck-card-row:hover{background:var(–surface2)}
.deck-card-row.sel{background:var(–surface2);border:1px solid var(–gold)}
.deck-card-thumb{
width:38px;height:53px;border-radius:4px;
object-fit:cover;border:1px solid var(–border);
background:var(–bg2);flex-shrink:0;
}
.deck-card-info{flex:1;min-width:0}
.deck-card-name{

<script>
// ════════════════════════════════════════════════════════
// ★ 設定：將這裡換成你的 Google Sheets 公開 CSV 網址
//   格式：https://docs.google.com/spreadsheets/d/{試算表ID}/export?format=csv&gid=0
// ════════════════════════════════════════════════════════
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSr6lIc1Be63ndyhxlqeFXjMlmtfMkr-M9cm-ElxfXDCrJLCTQC-jv6eY3qQJ0rL1MveHzQ_tgXVqC0/pub?output=csv';

// ─── STATE ───────────────────────────────────────────────
let ALL=[], FILTERED=[], SEL=null;
const ACTIVE_TYPES      = new Set();  // 寶可夢屬性篩選
const ACTIVE_ATK_ENERGY = new Set();  // 招式能量篩選
const PAGE_SIZE_DESKTOP = 20;
const PAGE_SIZE_MOBILE  = 18;  // ★ 3 的倍數，確保每頁剛好 3 欄整列
let curPage = 1;

function getPageSize(){ return isMobile ? PAGE_SIZE_MOBILE : PAGE_SIZE_DESKTOP; }

// ─── 自動載入 CSV ────────────────────────────────────────
async function autoLoad(){
  setLoading('正在連接 Google Sheets…', 20);

  if(SHEET_CSV_URL === 'YOUR_GOOGLE_SHEETS_CSV_URL_HERE'){
    showError(
      '尚未設定資料來源！',
      '請開啟此 HTML 檔案，將第一行 SHEET_CSV_URL 換成你的 Google Sheets CSV 網址。\n\n' +
      '設定方法請參考 README.md。'
    );
    return;
  }

  try {
    setLoading('下載卡牌資料…', 40);
    const resp = await fetch(SHEET_CSV_URL);
    if(!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);

    setLoading('解析資料中…', 70);
    const text = await resp.text();
    const cards = parseCSV(text);

    if(!cards.length) throw new Error('CSV 為空或格式錯誤');

    setLoading(`載入完成！共 ${cards.length} 張卡牌`, 100);
    setTimeout(()=>{
      document.getElementById('loadingScreen').style.display='none';
      loadCards(cards);
    }, 400);

  } catch(e) {
    showError(
      '載入失敗：' + e.message,
      'SHEET_CSV_URL 設定值：',
      SHEET_CSV_URL
    );
  }
}

function setLoading(msg, pct){
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingBar').style.width = pct + '%';
}

function showError(msg, hint='', url=''){
  document.getElementById('loadingBar').style.width = '100%';
  document.getElementById('loadingBar').style.background = 'var(--red)';
  const errEl = document.getElementById('loadingErr');
  errEl.style.display = 'block';
  document.getElementById('loadingErrMsg').innerHTML =
    `⚠ ${msg}<br><span style="color:var(--text3);font-size:.78rem">${hint}</span>` +
    (url ? `<code>${url}</code>` : '');
}

document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('loadingErr').style.display='none';
  document.getElementById('loadingBar').style.background='linear-gradient(90deg,var(--blue),var(--gold))';
  autoLoad();
});

// ─── CSV PARSER（支援欄位內換行）────────────────────────
function parseCSV(txt){
  // 正確處理 RFC 4180：quoted 欄位內可以有換行
  const rows = splitCSVRows(txt);
  if(rows.length < 2) return [];
  const hdrs = rows[0].map(h => h.trim());
  const out  = [];
  for(let i = 1; i < rows.length; i++){
    const vals = rows[i];
    if(vals.every(v => !v.trim())) continue;  // 跳過空行
    const o = {};
    hdrs.forEach((h, idx) => {
      // 把欄位內的換行轉成空格，避免顯示時斷掉
      o[h] = (vals[idx] || '').trim().replace(/\n+/g, ' ').replace(/\r/g, '');
    });
    out.push(o);
  }
  return out;
}

function splitCSVRows(txt){
  // 逐字元解析，正確處理 quoted multiline 欄位
  const rows = [];
  let row = [], cur = '', inQ = false;
  // 統一換行符
  txt = txt.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  for(let i = 0; i < txt.length; i++){
    const ch = txt[i];
    if(ch === '"'){
      if(inQ && txt[i+1] === '"'){ cur += '"'; i++; }  // escaped quote ""
      else inQ = !inQ;
    } else if(ch === ',' && !inQ){
      row.push(cur); cur = '';
    } else if(ch === '\n' && !inQ){
      row.push(cur); cur = '';
      rows.push(row); row = [];
    } else {
      cur += ch;
    }
  }
  // 最後一行
  if(cur || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

// ─── LOAD ────────────────────────────────────────────────
function loadCards(cards){
  ALL=cards;
  buildOpts();
  document.getElementById('totalCnt').textContent=cards.length;
  doSearch();
}
function buildOpts(){
  const types=[...new Set(ALL.map(c=>c.card_type).filter(Boolean))].sort();
  const sets =[...new Set(ALL.map(c=>c.set_name).filter(Boolean))].sort();
  const regs =[...new Set(ALL.map(c=>c.regulation).filter(Boolean))].sort();
  fillSel('fType',types);fillSel('fSet',sets);fillSel('fReg',regs);
}
function fillSel(id,opts){
  const el=document.getElementById(id);
  el.innerHTML='<option value="">全部</option>';
  opts.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;el.appendChild(op)});
}

// ─── SEARCH ──────────────────────────────────────────────
function doSearch(){
  const name =document.getElementById('fName').value.trim().toLowerCase();
  const type =document.getElementById('fType').value;
  const set  =document.getElementById('fSet').value;
  const reg  =document.getElementById('fReg').value;
  const hpMin=parseInt(document.getElementById('fHpMin').value)||0;
  const hpMax=parseInt(document.getElementById('fHpMax').value)||Infinity;
  const eff  =document.getElementById('fEff').value.trim().toLowerCase();
  FILTERED=ALL.filter(c=>{
    if(name&&!(c.name||'').toLowerCase().includes(name))return false;
    if(type&&c.card_type!==type)return false;
    if(set&&c.set_name!==set)return false;
    if(reg&&c.regulation!==reg)return false;
    const hp=parseInt(c.hp)||0;
    if(hp<hpMin||hp>hpMax)return false;
    // 寶可夢本身屬性篩選
    if(ACTIVE_TYPES.size>0&&!ACTIVE_TYPES.has(c.types))return false;
    // 招式能量篩選：從 attacks 的 (...) 括號內比對
    if(ACTIVE_ATK_ENERGY.size>0){
      const atksRaw = c.attacks || '';
      // 抓出所有括號內的能量，例如 "(水 水 無)" → ['水','水','無']
      const costMatches = [...atksRaw.matchAll(/\(([^)]+)\)/g)];
      const allCosts = costMatches.flatMap(m=>m[1].trim().split(/\s+/));
      // 每個選中的能量都必須出現在招式裡
      const hasAll = [...ACTIVE_ATK_ENERGY].every(e=>allCosts.includes(e));
      if(!hasAll)return false;
    }
    if(eff&&!((c.abilities||'')+(c.attacks||'')).toLowerCase().includes(eff))return false;
    return true;
  });
  curPage=1;applySort();
}
function applySort(){
  const s=document.getElementById('sortSel').value;
  if(s==='hp_desc')FILTERED.sort((a,b)=>(parseInt(b.hp)||0)-(parseInt(a.hp)||0));
  else if(s==='hp_asc')FILTERED.sort((a,b)=>(parseInt(a.hp)||0)-(parseInt(b.hp)||0));
  else if(s==='name')FILTERED.sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh-TW'));
  else if(s==='number')FILTERED.sort((a,b)=>(a.card_number||'').localeCompare(b.card_number||''));

  // 排除重複：以「名稱 + 特性 + 招式」作為 key，保留每組第一筆
  const dedup = document.getElementById('dedupChk').checked;
  let display = FILTERED;
  if(dedup){
    const seen = new Set();
    display = FILTERED.filter(c=>{
      const key = (c.name||'') + '||' + (c.abilities||'') + '||' + (c.attacks||'');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  curPage=1;renderGrid(display);
}

// ─── RENDER GRID ─────────────────────────────────────────
function renderGrid(display){
  if(!display) display=FILTERED;
  const PAGE_SIZE = getPageSize();
  const g=document.getElementById('grid');
  const pager=document.getElementById('pager');
  const total=display.length;
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  curPage=Math.min(curPage,pages);
  document.getElementById('resultCnt').textContent=total;

  // 顯示去重後的筆數，如果有去重就額外提示
  const rawTotal = FILTERED.length;
  const dedupOn  = document.getElementById('dedupChk').checked;
  document.getElementById('rlabel').textContent =
    dedupOn && rawTotal !== total
      ? `— ${total} RESULTS（已排除 ${rawTotal-total} 筆重複）—`
      : `— ${total} RESULTS —`;

  if(!total){
    g.innerHTML='<div class="empty-st"><div class="empty-ball"></div><span>沒有符合條件的卡牌</span></div>';
    pager.style.display='none';

    // 儲存當前 display 供換頁用
    renderGrid._cur = display;
    return;
  }

  renderGrid._cur = display;
  const slice=display.slice((curPage-1)*PAGE_SIZE,curPage*PAGE_SIZE);
  g.innerHTML='';
  slice.forEach(card=>{
    const div=document.createElement('div');
    div.className='card-thumb'+(SEL&&SEL.card_id===card.card_id?' sel':'');
    const src=card.image_url||'';
    if(src){
      const img=document.createElement('img');
      img.alt=card.name;img.loading='lazy';
      setImgWithFallback(img, src);
      div.appendChild(img);
    }else{div.appendChild(noImgEl(card.name));}
    div.addEventListener('click',()=>selectCard(card,div));
    g.appendChild(div);
  });
  g.scrollTop=0;
  renderPager(pages);
}

function renderPager(pages){
  const pager=document.getElementById('pager');
  if(pages<=1){pager.style.display='none';return;}
  pager.style.display='flex';pager.innerHTML='';
  const prev=mkBtn('‹',()=>goPage(curPage-1));prev.disabled=curPage===1;pager.appendChild(prev);
  pageNums(curPage,pages).forEach(n=>{
    if(n==='…'){const sp=document.createElement('span');sp.className='pager-info';sp.textContent='…';pager.appendChild(sp);}
    else{const b=mkBtn(n,()=>goPage(n));if(n===curPage)b.classList.add('active');pager.appendChild(b);}
  });
  const next=mkBtn('›',()=>goPage(curPage+1));next.disabled=curPage===pages;pager.appendChild(next);
  const info=document.createElement('span');info.className='pager-info';info.textContent=`${curPage}/${pages} 頁`;pager.appendChild(info);
}
function mkBtn(label,onClick){
  const b=document.createElement('button');b.className='pager-btn';b.textContent=label;
  b.addEventListener('click',onClick);return b;
}
function pageNums(cur,total){
  if(total<=7)return Array.from({length:total},(_,i)=>i+1);
  const n=[1];
  if(cur>3)n.push('…');
  for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)n.push(i);
  if(cur<total-2)n.push('…');
  n.push(total);return n;
}
function goPage(n){
  const display = renderGrid._cur || FILTERED;
  const pages=Math.ceil(display.length/getPageSize());
  if(n<1||n>pages)return;
  curPage=n;
  renderGrid(display);
  if(isMobile){
    document.body.scrollTo({top:0, behavior:'smooth'});
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

// 圖片 URL 處理：官方圖片直接用，載入失敗時改用 wsrv.nl proxy
function imgSrc(url){ return url||''; }
function setImgWithFallback(img, url){
  if(!url){ img.replaceWith(noImgEl('')); return; }
  img.src = url;
  img.onerror = ()=>{
    // 第一次失敗 → 試 proxy
    const proxy = 'https://wsrv.nl/?url=' + encodeURIComponent(url) + '&w=400&output=jpg';
    img.onerror = ()=>{ img.replaceWith(noImgEl(img.alt||'')); };
    img.src = proxy;
  };
}

      ${c.types?`<span class="tag" style="color:${tc};border-color:${tc}33">${esc(c.types)}</span>`:''}

  const isPoke=POKE_T.has(c.card_type);

  let html='';
  html+=`<div class="dsec"><div class="dsec-hdr">BASIC INFO</div>`;
  if(c.hp)html+=`<div class="srow"><span class="sl">HP</span><span class="hp-badge">${esc(c.hp)}</span></div>`;
  if(c.types)html+=`<div class="srow"><span class="sl">屬性</span><span class="sv" style="color:${tc}">${esc(c.types)}</span></div>`;
  if(c.set_name)html+=`<div class="srow"><span class="sl">擴充包</span><span class="sv" style="font-size:.7rem;text-align:right;max-width:170px">${esc(c.set_name)}</span></div>`;
  html+=`</div>`;
  if(c.abilities){
    html+=`<div class="dsec"><div class="dsec-hdr">特性 ABILITY</div>`;

      const p=ab.split(/\s{2,}/);
      html+=`<div class="ability-card"><div class="aname">◆ ${esc(p[0]||'')}</div>${p.slice(1).join(' ').trim()?`<div class="aeff">${esc(p.slice(1).join(' ').trim())}</div>`:''}</div>`;
    });html+=`</div>`;
  }
  if(isPoke&&c.attacks){
    html+=`<div class="dsec"><div class="dsec-hdr">招式 ATTACKS</div>`;

    });html+=`</div>`;
  }
  if(isEff&&c.attacks)html+=`<div class="dsec"><div class="dsec-hdr">效果 EFFECT</div><div class="eff-block">${esc(c.attacks)}</div></div>`;

    </button>
  </div>`;

  document.getElementById('dbody').innerHTML = html;

  // 儲存當前卡片供語音使用
  window._speakCard = c;
}

function speakCard(){
  const c = window._speakCard;
  if(!c) return;

  // 停止目前正在播放的語音
  window.speechSynthesis.cancel();

  const isPoke = POKE_T.has(c.card_type);
  const isEff  = EFF_T.has(c.card_type)||c.card_type==='基本能量卡';

  // 組合朗讀文字
  let text = '';
  text += `${c.name}。`;
  if(c.card_type) text += `${c.card_type}。`;
  if(c.hp)        text += `HP ${c.hp}。`;
  if(c.types)     text += `屬性，${c.types}。`;

  // 特性
  if(c.abilities){
    c.abilities.split('|').map(s=>s.trim()).filter(Boolean).forEach(ab=>{
      const p = ab.split(/\s{2,}/);
      text += `特性，${p[0]}。`;
      if(p.slice(1).join(' ').trim()) text += p.slice(1).join(' ').trim() + '。';
    });
  }

  // 招式
  if(isPoke && c.attacks){
    c.attacks.split('|').map(s=>s.trim()).filter(Boolean).forEach(atk=>{
      const p = atk.split(/\s{2,}/);
      let aname='', dmg='', eff='';
      p.forEach(seg=>{
        if(!aname){aname=seg;return}
        if(seg.startsWith('(')&&seg.endsWith(')')) return; // 略過能量符號
        if(/^\d+\+?$/.test(seg)){dmg=seg;return}
        eff+=(eff?' ':'')+seg;
      });
      text += `招式，${aname}`;
      if(dmg) text += `，傷害 ${dmg}`;
      text += '。';
      if(eff) text += eff + '。';
    });
  }

  // 效果卡
  if(isEff && c.attacks){
    text += `效果，${c.attacks}。`;
  }

  // 對戰數值
  if(isPoke){
    if(c.weakness)     text += `弱點，${c.weakness}。`;
    if(c.retreat_cost) text += `撤退費用，${c.retreat_cost}。`;
  }

  // 規則
  if(c.rules){
    c.rules.split('|').map(s=>s.trim()).filter(Boolean).forEach(r=>{
      text += r + '。';
    });
  }

  // 建立語音
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = 0.9;   // 稍慢一點，小朋友聽得清楚
  utter.pitch = 1.1;  // 稍高音調，比較活潑

  // 按鈕動畫
  const btn = document.getElementById('speakBtn');
  if(btn){
    btn.textContent = '⏹ 停止朗讀';
    btn.onclick = ()=>{ window.speechSynthesis.cancel(); resetSpeakBtn(); };
  }
  utter.onend = resetSpeakBtn;
  utter.onerror = resetSpeakBtn;

  window.speechSynthesis.speak(utter);
}

function resetSpeakBtn(){
  const btn = document.getElementById('speakBtn');
  if(btn){
    btn.textContent = '🔊 朗讀卡片資訊';
    btn.onclick = speakCard;
  }
}

async function fetchDeck(){
  const code = document.getElementById('deckCodeInput').value.trim();
  if(!code){ setDeckStatus('請輸入牌組代碼','err'); return; }

  // 驗證格式：xxxxxx-xxxxxx-xxxxxx
  if(!/^[A-Za-z0-9]+-[A-Za-z0-9]+-[A-Za-z0-9]+$/.test(code)){
    setDeckStatus('格式錯誤，應為 xxxxxx-xxxxxx-xxxxxx','err'); return;
  }

  setDeckStatus('查詢中…','');
  document.getElementById('deckFetchBtn').disabled = true;

  try{
    let url, html;
    if(deckRegion === 'tw'){
      url = `https://asia.pokemon-card.com/tw/deck-build/recipe/${code}/`;
    } else {
      url = `https://www.pokemon-card.com/deck/print.html/deckID/${code}/`;
    }

    const proxyUrl = PROXY + encodeURIComponent(url);
    const resp = await fetch(proxyUrl);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    html = await resp.text();

    const cards = deckRegion==='tw'
      ? parseTWDeck(html)
      : parseJPDeck(html);

    if(!cards.length) throw new Error('找不到卡牌資料，請確認代碼是否正確');

    const total = cards.reduce((s,c)=>s+c.qty,0);
    setDeckStatus(`✓ 共 ${cards.length} 種卡牌 / ${total} 張`,'ok');
    renderDeckList(cards);

  } catch(e){
    setDeckStatus('查詢失敗：' + e.message,'err');
  } finally {
    document.getElementById('deckFetchBtn').disabled = false;
  }
}

function setDeckStatus(msg, cls){
  const el = document.getElementById('deckStatus');
  el.textContent = msg;
  el.className = 'deck-status' + (cls ? ' '+cls : '');
}

// ── 台灣版解析 ───────────────────────────────────────────
// recipe 頁面結構：
//   <li>
//     <a href="/tw/card-search/detail/216/">...<span>2</span></a>
//     卡牌名（文字節點）
//   </li>
// 或 list view：
//   <li>卡牌名 擴充包 編號 張數</li>
function parseTWDeck(html){
  const doc = new DOMParser().parseFromString(html,'text/html');
  const cards = [];
  const seenSections = new Set();

  doc.body.querySelectorAll('h3').forEach(h3=>{
    const title = h3.textContent.trim();
    // 只處理分類標題，例如「寶可夢卡(20)」「物品卡(14)」
    const sectionMatch = title.match(/^(.+?)[（(]\d+[)）]/);
    if(!sectionMatch) return;
    const curSection = sectionMatch[1].trim();

    // ★ 第二次遇到同分類 → 下半段，停止
    if(seenSections.has(curSection)) return;
    seenSections.add(curSection);

    const ul = h3.nextElementSibling;
    if(!ul || ul.tagName !== 'UL') return;

    ul.querySelectorAll('li').forEach(li=>{
      const a = li.querySelector('a[href*="/card-search/detail/"]');
      if(!a) return;

      // card_id from href
      const m = a.href.match(/\/card-search\/detail\/(\d+)\/?/);
      if(!m) return;
      const card_id = m[1];

      // ★ 張數：a 標籤內的純文字（img 沒有文字，只有最後的數字）
      // a.textContent 範例："\n  \n  2" → 取最後的整數
      const aText = a.textContent.trim();
      const qty   = parseInt(aText.match(/(\d+)\s*$/)?.[1] || '1');

      cards.push({ card_id, qty, section: curSection });
    });
  });

  return cards;
}

// ── 日本版解析 ───────────────────────────────────────────
// print.html 結構：每個分類有自己的 <table>
// 表格第一列第一格是分類名（ポケモン/グッズ等）
function parseJPDeck(html){
  const doc = new DOMParser().parseFromString(html,'text/html');
  const cards = [];

  // 日文分類 → 中文 section
  const JP_SEC = {
    'ポケモン':'寶可夢', 'ポケモンのどうぐ':'寶可夢',
    'グッズ':'訓練家',  'サポート':'訓練家', 'スタジアム':'訓練家',
    'エネルギー':'能量',
  };
  const SKIP = new Set(['ポケモン','ポケモンのどうぐ','グッズ','サポート',
    'スタジアム','エネルギー','小計','合計','カード名',
    'プレイヤーID','ニックネーム','生年月日','大会名','開催地','出場リーグ',
    '氏名：カナ','氏名：漢字','']);

  doc.querySelectorAll('table').forEach(table=>{
    // 判斷這個 table 屬於哪個分類
    // 找最近的前置元素裡有沒有分類關鍵字（有些版本用 th，有些用獨立 table）
    let section = '';
    const firstTd = table.querySelector('td');
    if(!firstTd) return;
    const firstText = firstTd.textContent.trim();
    if(JP_SEC[firstText]) section = JP_SEC[firstText];

    // 如果第一格就是分類名，那這是「標題表格」，不是資料列，跳過
    if(SKIP.has(firstText) && !section) return;

    table.querySelectorAll('tr').forEach(row=>{
      const cells = row.querySelectorAll('td');
      if(cells.length < 2) return;

      const name = cells[0].textContent.trim();
      const qty  = parseInt(cells[1].textContent.trim())||0;
      const set  = cells[2]?.textContent.trim()||'';
      const num  = cells[3]?.textContent.trim()||'';

      if(!name || !qty || SKIP.has(name)) return;

      // 用 card_number 在 CSV 比對
      const matched = ALL.find(c=> c.card_number === num);

      // 若有比對到 → 用中文資料；沒有 → 保留日文名稱和原始資訊
      cards.push({
        card_id: matched?.card_id || '',
        name:    matched?.name || name,   // 有中文用中文，沒有保留日文
        qty,
        sub:     matched
          ? (matched.set_name||'') + (matched.card_number ? ' #'+matched.card_number : '')
          : set + (num ? ' '+num : ''),   // 沒比對到就顯示日文擴充包+編號
        section: section || (matched ? SECTION_LABEL[matched.card_type]||'訓練家' : '訓練家'),
      });
    });
  });

  return cards;
}

// ── 渲染牌組列表 ─────────────────────────────────────────
const SECTION_LABEL = {
  '寶可夢卡':'寶可夢','寶可夢道具':'寶可夢',
  '物品卡':'訓練家','支援者卡':'訓練家','競技場卡':'訓練家','訓練家卡':'訓練家',
  '能量卡':'能量','特殊能量卡':'能量','基本能量卡':'能量',
};

function renderDeckList(cards){
  const el = document.getElementById('deckList');
  if(!cards.length){
    el.innerHTML='<div class="deck-empty"><span>找不到卡牌資料</span></div>';
    return;
  }

  // 對應 CSV 資料補充圖片
  const enriched = cards.map(c=>{
    const csv = c.card_id ? ALL.find(a=>a.card_id===c.card_id) : null;
    return {...c, _csv: csv};
  });

  // 分組
  const groupMap = {};
  enriched.forEach(c=>{
    let grp;
    if(c.section){
      grp = c.section;
    } else if(c._csv?.card_type){
      grp = SECTION_LABEL[c._csv.card_type] || '訓練家';
    } else {
      grp = '訓練家';
    }
    if(!groupMap[grp]) groupMap[grp] = [];
    groupMap[grp].push(c);
  });

  // ★ 固定順序：寶可夢 → 訓練家 → 能量 → 其他
  const ORDER = ['寶可夢','訓練家','能量','其他'];
  const sortedGroups = [
    ...ORDER.filter(k=>groupMap[k]).map(k=>[k, groupMap[k]]),
    ...Object.entries(groupMap).filter(([k])=>!ORDER.includes(k)),
  ];

  let html = '';
  sortedGroups.forEach(([sec, list])=>{
    if(!list.length) return;
    const total = list.reduce((s,c)=>s+c.qty, 0);
    html += `<div class="deck-section-title">${sec}（${total}張）</div>`;
    list.forEach(c=>{
      const imgSrc  = c._csv?.image_url || '';
      const sub     = c.sub || '';
      const nameShow= c._csv?.name || c.name || '—';
      html += `
        <div class="deck-card-row" data-cid="${c.card_id||''}">
          ${imgSrc
            ? `<img class="deck-card-thumb" src="${imgSrc}" alt="${esc(nameShow)}"
                onerror="this.src='https://wsrv.nl/?url='+encodeURIComponent('${imgSrc}')+'&w=80&output=jpg'">`
            : `<div class="deck-card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:.5rem;color:#7888b8;padding:2px;text-align:center">${esc(nameShow)}</div>`
          }
          <div class="deck-card-info">
            <div class="deck-card-name">${esc(nameShow)}</div>
            <div class="deck-card-sub">${esc(sub)}</div>
          </div>
          <div class="deck-card-qty">×${c.qty}</div>
        </div>`;
    });
  });

  el.innerHTML = html;

  // 點擊行 → 在抽屜內顯示卡牌詳情
  el.querySelectorAll('.deck-card-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const cid = row.dataset.cid;
      if(!cid){ setDeckStatus('此卡牌不在目前資料庫中','err'); return; }
      const card = ALL.find(a=>a.card_id===cid);
      if(!card){ setDeckStatus('此卡牌不在目前資料庫中（可能是未爬取的版本）','err'); return; }

      // 高亮選中
      el.querySelectorAll('.deck-card-row').forEach(r=>r.classList.remove('sel'));
      row.classList.add('sel');

      // 同步顯示到主畫面（桌面版用）
      selectCard(card, null);

      // 在抽屜內顯示大圖 + 詳情
      showDeckCardDetail(card);
    });
  });
}

function showDeckCardDetail(card){
  const detailEl = document.getElementById('deckDetail');
  const listEl   = document.getElementById('deckList');
  const imgEl    = document.getElementById('deckDetailImg');
  const bodyEl   = document.getElementById('deckDetailBody');

  // 大圖
  const src = card.image_url || '';
  if(src){
    const img = document.createElement('img');
    img.alt = card.name;
    setImgWithFallback(img, src);
    imgEl.innerHTML = '';
    imgEl.appendChild(img);
  } else {
    imgEl.innerHTML = `<div style="padding:30px;color:var(--text3);font-size:.8rem">無圖片</div>`;
  }

  // 詳情內容（複用 renderDetail 的 HTML）
  const tc = TYPE_C[card.types]||'var(--text2)';
  const isPoke = POKE_T.has(card.card_type);
  const isEff  = EFF_T.has(card.card_type)||card.card_type==='基本能量卡';
  let html = '';

  // 標題
  html += `<div style="margin-bottom:10px">
    <div style="font-size:1.2rem;font-weight:700;color:var(--gold)">${esc(card.name||'—')}</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">
      ${card.card_type?`<span class="tag">${esc(card.card_type)}</span>`:''}
      ${card.card_number?`<span class="tag">#${esc(card.card_number)}</span>`:''}
      ${card.types?`<span class="tag" style="color:${tc};border-color:${tc}33">${esc(card.types)}</span>`:''}
    </div>
  </div>`;

  // 基本資訊
  html += `<div class="dsec"><div class="dsec-hdr">BASIC INFO</div>`;
  if(card.hp) html += `<div class="srow"><span class="sl">HP</span><span class="hp-badge">${esc(card.hp)}</span></div>`;
  if(card.types) html += `<div class="srow"><span class="sl">屬性</span><span class="sv" style="color:${tc}">${esc(card.types)}</span></div>`;
  if(card.set_name) html += `<div class="srow"><span class="sl">擴充包</span><span class="sv" style="font-size:.75rem">${esc(card.set_name)}</span></div>`;
  html += '</div>';

  // 特性
  if(card.abilities){
    html += `<div class="dsec"><div class="dsec-hdr">特性 ABILITY</div>`;
    card.abilities.split('|').map(s=>s.trim()).filter(Boolean).forEach(ab=>{
      const p = ab.split(/\s{2,}/);
      html += `<div class="ability-card">
        <div class="aname">◆ ${esc(p[0]||'')}</div>
        ${p.slice(1).join(' ').trim()?`<div class="aeff">${esc(p.slice(1).join(' ').trim())}</div>`:''}
      </div>`;
    });
    html += '</div>';
  }

  // 招式
  if(isPoke && card.attacks){
    html += `<div class="dsec"><div class="dsec-hdr">招式 ATTACKS</div>`;
    card.attacks.split('|').map(s=>s.trim()).filter(Boolean).forEach(atk=>{
      const p = atk.split(/\s{2,}/);
      let aname='',costStr='',dmg='',eff='';
      p.forEach(seg=>{
        if(!aname){aname=seg;return}
        if(seg.startsWith('(')&&seg.endsWith(')')){costStr=seg.slice(1,-1);return}
        if(/^\d+\+?$/.test(seg)){dmg=seg;return}
        eff+=(eff?' ':'')+seg;
      });
      const bubbles=costStr?costStr.split(' ').filter(Boolean).map(e=>`<span class="ec ec-${e}">${e[0]}</span>`).join(''):'';
      html += `<div class="atk-card">
        <div class="atk-hdr">
          <span class="atk-name">${esc(aname)}</span>
          ${bubbles?`<span class="cost-wrap">${bubbles}</span>`:''}
          <span class="atk-dmg">${esc(dmg)}</span>
        </div>
        ${eff?`<div class="atk-eff">${esc(eff)}</div>`:''}
      </div>`;
    });
    html += '</div>';
  }

  // 效果
  if(isEff && card.attacks){
    html += `<div class="dsec"><div class="dsec-hdr">效果 EFFECT</div>
      <div class="eff-block">${esc(card.attacks)}</div></div>`;
  }

  // 對戰數值
  if(isPoke && (card.weakness||card.resistance||card.retreat_cost)){
    html += `<div class="dsec"><div class="dsec-hdr">對戰數值</div>
      <div class="bstats">
        <div class="bstat"><div class="bstat-l">弱點</div><div class="bstat-v">${esc(card.weakness||'—')}</div></div>
        <div class="bstat"><div class="bstat-l">抵抗力</div><div class="bstat-v">${esc(card.resistance||'—')}</div></div>
        <div class="bstat"><div class="bstat-l">撤退</div><div class="bstat-v">${esc(card.retreat_cost||'—')}</div></div>
      </div></div>`;
  }

  // 規則
  if(card.rules){
    html += `<div class="dsec"><div class="dsec-hdr">規則 RULES</div>`;
    card.rules.split('|').map(s=>s.trim()).filter(Boolean).forEach(r=>{
      html += `<div class="rule-block">${esc(r)}</div>`;
    });
    html += '</div>';
  }

  bodyEl.innerHTML = html;

  // 切換顯示：隱藏列表，顯示詳情
  listEl.style.display   = 'none';
  detailEl.style.display = 'flex';
  detailEl.scrollTop     = 0;
}

// 返回牌組列表
document.getElementById('deckBack').addEventListener('click',()=>{
  document.getElementById('deckDetail').style.display = 'none';
  document.getElementById('deckList').style.display   = '';
});

// ─── 手機模式切換 ────────────────────────────────────────
const modeBtn    = document.getElementById('modeBtn');
const filterHdr  = document.getElementById('filterHdr');
const filtersPnl = document.getElementById('filtersPanel');
let   isMobile   = window.innerWidth < 768;

function applyMode(){
  if(isMobile){
    document.body.classList.add('mobile');
    modeBtn.textContent = '🖥 桌面版';
    modeBtn.classList.add('mobile-on');
    document.body.style.overflow = 'auto';
    document.querySelector('.layout').style.height = 'auto';
  } else {
    document.body.classList.remove('mobile');
    modeBtn.textContent = '📱 手機版';
    modeBtn.classList.remove('mobile-on');
    document.body.style.overflow = 'hidden';
    document.querySelector('.layout').style.height = '';
  }
  renderGrid();
}

modeBtn.addEventListener('click', ()=>{
  isMobile = !isMobile;
  applyMode();
});

// 自動偵測螢幕寬度
window.addEventListener('resize', ()=>{
  const shouldMobile = window.innerWidth < 768;
  if(shouldMobile !== isMobile){
    isMobile = shouldMobile;
    applyMode();
  }
});

// ★ 浮動捲動按鈕
document.getElementById('scrollTopBtn').addEventListener('click', ()=>{
  document.body.scrollTo({top:0, behavior:'smooth'});
  window.scrollTo({top:0, behavior:'smooth'});
});
document.getElementById('scrollBotBtn').addEventListener('click', ()=>{
  const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
  document.body.scrollTo({top:h, behavior:'smooth'});
  window.scrollTo({top:h, behavior:'smooth'});
});
document.getElementById('floatResetBtn').addEventListener('click', ()=>{
  ['fName','fType','fSet','fReg','fHpMin','fHpMax','fEff'].forEach(id=>document.getElementById(id).value='');
  ACTIVE_TYPES.clear();
  ACTIVE_ATK_ENERGY.clear();
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  curPage=1;
  doSearch();
  document.body.scrollTo({top:0, behavior:'smooth'});
  window.scrollTo({top:0, behavior:'smooth'});
});

// 啟動時套用
applyMode();

// ─── 啟動 ───────────────────────────────────────────────
autoLoad();
</script>

</body>
</html>
